services:
  postgres:
    image: postgres:16-alpine
    container_name: nextgen-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nextgen
      POSTGRES_PASSWORD: nextgen
      POSTGRES_DB: nextgen_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextgen -d nextgen_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
