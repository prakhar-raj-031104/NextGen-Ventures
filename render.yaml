services:
  # ── Backend API (Node.js / Express) ────────────────────────────────────────
  - type: web
    name: nextgen-api
    env: node
    region: singapore
    plan: starter
    buildCommand: npm ci && npm run build:prod -w apps/backend
    startCommand: npm run start:prod -w apps/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nextgen-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://nextgenventures.in,https://www.nextgenventures.in
      - key: UPLOAD_DIR
        value: /data/uploads
    disk:
      name: uploads
      mountPath: /data
      sizeGB: 1

  # ── Frontend Static Site (React / Vite) ────────────────────────────────────
  - type: web
    name: nextgen-web
    env: static
    region: singapore
    buildCommand: npm ci && npm run build -w apps/frontend
    staticPublishPath: apps/frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://nextgen-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── Managed PostgreSQL ──────────────────────────────────────────────────────
databases:
  - name: nextgen-db
    databaseName: nextgendb
    user: nextgen_user
    plan: starter
    region: singapore
