services:
  # ── Backend API (Node.js / Express) ────────────────────────────────────────
  - type: web
    name: nextgen-api
    env: node
    plan: free
    region: singapore
    buildCommand: npm ci --include=dev && npm run build:prod -w apps/backend
    startCommand: npm run start:prod -w apps/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://nextgen-web-g132.onrender.com
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TOKEN_TTL_HOURS
        value: "168"
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN_TTL_HOURS
        value: "12"

  # ── Frontend Static Site (React / Vite) ────────────────────────────────────
  - type: web
    name: nextgen-web
    env: static
    buildCommand: npm ci --include=dev && npm run build -w apps/frontend
    staticPublishPath: apps/frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://nextgen-api-3n55.onrender.com/api
    routes:
      - type: rewrite
        source: /*se
        
        destination: /index.html
